apiVersion: apps/v1
kind: Deployment
metadata:
  name: analytics-service
  namespace: scada
spec:
  replicas: 1
  selector:
    matchLabels:
      app: analytics-service
  template:
    metadata:
      labels:
        app: analytics-service
    spec:
      containers:
        - name: analytics-service
          image: scada/analytics-service:latest
          ports:
            - containerPort: 8080
          env:
            - name: ConnectionStrings__Postgres
              value: "Host=postgres-analytics;Database=analytics;Username=postgres;Password=$(POSTGRES_PASSWORD)"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: scada-secrets
                  key: postgres-password
            - name: Jwt__Key
              valueFrom:
                secretKeyRef:
                  name: scada-secrets
                  key: jwt-key
            - name: Jwt__Issuer
              value: "scada-auth-service"
            - name: Jwt__Audience
              value: "scada-platform"
            - name: Services__Ingestion
              value: "http://ingestion-service:8080"
            - name: Services__Consensus
              value: "http://consensus-service:8080"
            - name: Services__SensorMgmt
              value: "http://sensormgmt-service:8080"
            - name: Cache__TtlSeconds
              value: "30"
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-analytics
  namespace: scada
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres-analytics
  template:
    metadata:
      labels:
        app: postgres-analytics
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          env:
            - name: POSTGRES_DB
              value: analytics
            - name: POSTGRES_USER
              value: postgres
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: scada-secrets
                  key: postgres-password
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: [pg_isready, -U, postgres]
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: postgres-analytics-pvc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-analytics-pvc
  namespace: scada
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
