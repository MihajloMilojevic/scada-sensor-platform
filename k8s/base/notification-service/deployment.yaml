apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: scada
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
        - name: notification-service
          image: scada/notification-service:latest
          ports:
            - containerPort: 8080
          env:
            - name: Kafka__BootstrapServers
              value: "kafka:9092"
            - name: Jwt__Key
              valueFrom:
                secretKeyRef:
                  name: scada-secrets
                  key: jwt-key
            - name: Jwt__Issuer
              value: "scada-auth-service"
            - name: Jwt__Audience
              value: "scada-platform"
            - name: Cors__Origins
              value: "http://localhost:4200"
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
