apiVersion: apps/v1
kind: Deployment
metadata:
  name: ingestion-service
  namespace: scada
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ingestion-service
  template:
    metadata:
      labels:
        app: ingestion-service
    spec:
      containers:
        - name: ingestion-service
          image: scada/ingestion-service:latest
          ports:
            - containerPort: 8080
          env:
            - name: Kafka__BootstrapServers
              value: "kafka:9092"
            - name: InfluxDb__Url
              value: "http://influxdb-ingestion:8086"
            - name: InfluxDb__Token
              valueFrom:
                secretKeyRef:
                  name: scada-secrets
                  key: influx-token
            - name: InfluxDb__Org
              value: "scada"
            - name: InfluxDb__Bucket
              value: "sensor-data"
            - name: Jwt__Key
              valueFrom:
                secretKeyRef:
                  name: scada-secrets
                  key: jwt-key
            - name: Jwt__Issuer
              value: "scada-auth-service"
            - name: Jwt__Audience
              value: "scada-platform"
            - name: Security__EcdsaPublicKey
              valueFrom:
                secretKeyRef:
                  name: scada-secrets
                  key: ecdsa-public-key
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: influxdb-ingestion
  namespace: scada
spec:
  replicas: 1
  selector:
    matchLabels:
      app: influxdb-ingestion
  template:
    metadata:
      labels:
        app: influxdb-ingestion
    spec:
      containers:
        - name: influxdb
          image: influxdb:2.7
          ports:
            - containerPort: 8086
          env:
            - name: DOCKER_INFLUXDB_INIT_MODE
              value: setup
            - name: DOCKER_INFLUXDB_INIT_USERNAME
              value: admin
            - name: DOCKER_INFLUXDB_INIT_PASSWORD
              value: adminpassword
            - name: DOCKER_INFLUXDB_INIT_ORG
              value: scada
            - name: DOCKER_INFLUXDB_INIT_BUCKET
              value: sensor-data
            - name: DOCKER_INFLUXDB_INIT_ADMIN_TOKEN
              valueFrom:
                secretKeyRef:
                  name: scada-secrets
                  key: influx-token
          volumeMounts:
            - name: influx-data
              mountPath: /var/lib/influxdb2
          readinessProbe:
            httpGet:
              path: /ping
              port: 8086
            initialDelaySeconds: 10
            periodSeconds: 5
      volumes:
        - name: influx-data
          persistentVolumeClaim:
            claimName: influxdb-pvc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: influxdb-pvc
  namespace: scada
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
