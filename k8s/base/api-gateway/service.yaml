apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: scada
spec:
  selector:
    app: api-gateway
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: redis-gateway
  namespace: scada
spec:
  selector:
    app: redis-gateway
  ports:
    - port: 6379
      targetPort: 6379
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway-external
  namespace: scada
spec:
  type: LoadBalancer
  selector:
    app: api-gateway
  ports:
    - port: 80
      targetPort: 8080
