apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: scada
spec:
  selector:
    app: auth-service
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-auth
  namespace: scada
spec:
  selector:
    app: postgres-auth
  ports:
    - port: 5432
      targetPort: 5432
---
apiVersion: v1
kind: Service
metadata:
  name: redis-auth
  namespace: scada
spec:
  selector:
    app: redis-auth
  ports:
    - port: 6379
      targetPort: 6379
