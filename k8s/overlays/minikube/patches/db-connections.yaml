apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: scada
spec:
  template:
    spec:
      containers:
        - name: auth-service
          env:
            - name: ConnectionStrings__Postgres
              value: "Host=postgres-auth;Database=auth;Username=postgres;Password=postgres"
            - name: ConnectionStrings__Redis
              value: "redis-auth:6379"
---
